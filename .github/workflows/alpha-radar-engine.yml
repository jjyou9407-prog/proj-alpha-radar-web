name: Alpha Radar Engine

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC.
    # Every 10 minutes. Actual start can be delayed by GitHub runner availability.
    - cron: "*/10 * * * *"

concurrency:
  group: alpha-radar-engine
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: engine

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      ALPHA_RADAR_LOOP: "false"
      ALPHA_RADAR_MIN_STOCK_ROWS: "0"
      ALPHA_RADAR_US_WORKERS: "3"
      ALPHA_RADAR_KR_WORKERS: "4"
      ALPHA_RADAR_PRICE_UPDATE_WORKERS: "4"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Use cloud config
        run: cp config.cloud.json config.json

      - name: Run Alpha Radar scan once
        run: python alpha_radar_engine_v1.py

